<script>
  async function carregarArtigos() {
    const container = document.getElementById('posts-container');
    
    try {
      const resposta = await fetch('posts.json');
      if (!resposta.ok) throw new Error('Arquivo posts.json não encontrado');
      
      const posts = await resposta.json();
      
      if (!posts || posts.length === 0) {
        container.innerHTML = '<div style="grid-column: 1/-1; text-align: center;">Nenhum artigo publicado ainda.</div>';
        return;
      }
      
      container.innerHTML = '';
      
      posts.forEach(post => {
        const data = new Date(post.date);
        const dataFormatada = data.toLocaleDateString('pt-BR');
        
        const card = document.createElement('article');
        card.className = 'blog-card';
        card.innerHTML = `
          <img src="${post.image}" alt="${post.title}" onerror="this.src='https://via.placeholder.com/600x400/1F4FD8/FFFFFF?text=Engevis'">
          <div class="blog-card-content">
            <h3>${post.title}</h3>
            <div class="blog-card-meta">
              <span><i class="far fa-calendar-alt"></i> ${dataFormatada}</span>
              <span><i class="far fa-folder"></i> ${post.category}</span>
            </div>
            <p>${post.description}</p>
            <a href="post.html?slug=${post.slug}" class="btn-link">Leia mais <i class="fas fa-arrow-right"></i></a>
          </div>
        `;
        
        container.appendChild(card);
      });
      
    } catch (erro) {
      console.error('Erro:', erro);
      container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #ff6b6b;">Erro ao carregar publicações. Verifique se o arquivo posts.json existe.</div>';
    }
  }
  
  window.addEventListener('load', carregarArtigos);
</script>
