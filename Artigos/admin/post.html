<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../images/logo.PNG" type="image/png">
  <title>Artigo | Engevis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* Mesmo CSS da página de listagem (copie o bloco <style> inteiro da index.html para cá) */
    /* ... */
    /* Vou omitir por brevidade, mas você deve copiar exatamente o mesmo estilo */
  </style>
</head>
<body>

<header class="header"> <!-- igual ao da index --> </header>

<section class="blog-hero" style="min-height: 30vh;">
  <div class="container">
    <div class="blog-hero-content" id="post-header">
      <h1 class="hero-title" id="post-title">Carregando...</h1>
      <div class="blog-card-meta" id="post-meta" style="justify-content: center;"></div>
    </div>
  </div>
</section>

<section class="bg-base">
  <div class="container">
    <div class="projeto-texto" id="post-content" style="max-width: 800px; margin: 0 auto;">
      <!-- Conteúdo do artigo será inserido aqui -->
    </div>
  </div>
</section>

<footer class="footer"> <!-- igual ao da index --> </footer>

<script>
  async function carregarPost() {
    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get('slug');
    
    if (!slug) {
      document.getElementById('post-title').textContent = 'Artigo não encontrado';
      return;
    }
    
    try {
      const resposta = await fetch(`https://api.github.com/repos/engevisengenharia/engevisengenharia.github.io/contents/Artigos_e_Publicacoes/posts/${slug}.md`);
      if (!resposta.ok) throw new Error('Post não encontrado');
      
      const data = await resposta.json();
      const conteudo = atob(data.content); // GitHub retorna em base64
      
      // Extrair front matter e conteúdo
      const partes = conteudo.split('---');
      if (partes.length < 3) {
        document.getElementById('post-content').innerHTML = '<p>Erro ao processar o artigo.</p>';
        return;
      }
      
      const metadadosRaw = partes[1].trim();
      const metadados = {};
      metadadosRaw.split('\n').forEach(linha => {
        const separador = linha.indexOf(':');
        if (separador > 0) {
          const chave = linha.substring(0, separador).trim();
          const valor = linha.substring(separador + 1).trim();
          metadados[chave] = valor;
        }
      });
      
      const corpo = partes.slice(2).join('---').trim(); // O resto é o conteúdo
      
      // Atualizar título e meta
      document.getElementById('post-title').textContent = metadados.title || 'Sem título';
      
      let metaHtml = '';
      if (metadados.date) {
        const data = new Date(metadados.date);
        metaHtml += `<span><i class="far fa-calendar-alt"></i> ${data.toLocaleDateString('pt-BR')}</span>`;
      }
      if (metadados.category) {
        metaHtml += `<span><i class="far fa-folder"></i> ${metadados.category}</span>`;
      }
      document.getElementById('post-meta').innerHTML = metaHtml;
      
      // Converter markdown para HTML (usando uma biblioteca simples)
      // Se não quiser instalar nada, pode usar o marked.js via CDN
      // Vou incluir o marked.js para facilitar
      const marked = window.marked;
      document.getElementById('post-content').innerHTML = marked.parse(corpo);
      
    } catch (erro) {
      document.getElementById('post-title').textContent = 'Erro ao carregar';
      document.getElementById('post-content').innerHTML = '<p>Artigo não encontrado ou erro na leitura.</p>';
    }
  }
  
  // Carregar a biblioteca marked para converter markdown em HTML
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
  script.onload = carregarPost;
  document.head.appendChild(script);
</script>

</body>
</html>
